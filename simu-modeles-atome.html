<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation - Histoire du Modèle de l'Atome</title>
    <style>
        :root {
            --primary: #6f42c1;
            --secondary: #ffb000;
            --bg: #f8fafc;
            --card: #ffffff;
            --ai: #8b5cf6;
            --view-bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sim-container {
            max-width: 900px;
            width: 100%;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            border-top: 8px solid var(--primary);
        }

        h2 { color: var(--primary); margin-top: 0; text-align: center; }

        .view-area {
            height: 380px;
            background: var(--view-bg);
            border-radius: 15px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-model {
            padding: 10px;
            border: 2px solid var(--primary);
            border-radius: 10px;
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .btn-model:hover { background: #f3f0ff; }
        .btn-model.active { background: var(--primary); color: white; }

        .desc-box {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--primary);
            margin-bottom: 20px;
            min-height: 100px;
        }

        /* Objets graphiques */
        .nucleus { width: 16px; height: 16px; background: #f87171; border-radius: 50%; box-shadow: 0 0 15px #f87171; z-index: 10; position: relative; }
        .electron { position: absolute; width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; box-shadow: 0 0 8px #3b82f6; pointer-events: none; }
        
        .orbit {
            position: absolute;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quantum-cloud {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.4) 0%, rgba(59, 130, 246, 0.1) 40%, transparent 70%);
            border-radius: 50%;
            animation: breathe 4s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.4; }
        }

        .ai-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-ai {
            background: var(--ai);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-ai:hover { opacity: 0.9; }

        #ai-output {
            margin-top: 15px;
            padding: 15px;
            background: #f5f3ff;
            border: 1px solid #ddd6fe;
            border-radius: 10px;
            display: none;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #4c1d95;
        }

        .btn-retour {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            color: #64748b;
            font-weight: 500;
        }

        /* Dalton & Thomson spécifiques */
        .dalton-sphere { width: 120px; height: 120px; background: radial-gradient(circle at 30% 30%, #94a3b8, #1e293b); border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .thomson-pudding { width: 150px; height: 150px; background: rgba(248, 113, 113, 0.25); border: 2px dashed #f87171; border-radius: 50%; position: relative; }
    </style>
</head>
<body>

    <div class="sim-container">
        <h2>🔬 Évolution des Modèles de l'Atome</h2>
        <p style="text-align: center; color: #64748b;">De la bille de billard au nuage de probabilités</p>

        <div class="view-area" id="view-area">
            <!-- Rendu dynamique ici -->
        </div>

        <div class="controls">
            <button class="btn-model" id="btn-dalton" onclick="selectModel('dalton')">Dalton (1808)</button>
            <button class="btn-model" id="btn-thomson" onclick="selectModel('thomson')">Thomson (1904)</button>
            <button class="btn-model" id="btn-rutherford" onclick="selectModel('rutherford')">Rutherford (1911)</button>
            <button class="btn-model" id="btn-bohr" onclick="selectModel('bohr')">Bohr (1913)</button>
            <button class="btn-model" id="btn-quantique" onclick="selectModel('quantique')">Quantique (1926+)</button>
        </div>

        <div class="desc-box" id="desc-box">
            Sélectionnez un modèle pour explorer sa structure.
        </div>

        <div class="ai-section">
            <button class="btn-ai" onclick="askAI('experience')">✨ L'expérience historique</button>
            <button class="btn-ai" onclick="askAI('limite')">🚀 Limites ou Concept</button>
        </div>

        <div id="ai-output"></div>

        <center><a href="#" class="btn-retour">← Retour au catalogue des simulations</a></center>
    </div>

    <script>
        const apiKey = ""; 
        let currentModel = 'dalton';
        let animationFrame;

        const models = {
            dalton: {
                title: "Modèle de Dalton (La bille)",
                text: "John Dalton imagine l'atome comme une sphère pleine et indivisible. Pour lui, tous les atomes d'un même élément sont identiques."
            },
            thomson: {
                title: "Modèle de Thomson (Plum Pudding)",
                text: "Thomson découvre l'électron. Il propose un atome constitué d'une soupe positive dans laquelle baignent des électrons négatifs."
            },
            rutherford: {
                title: "Modèle de Rutherford (Planétaire)",
                text: "Rutherford démontre que l'atome est constitué de vide. Un noyau positif très dense occupe le centre, et les électrons tournent autour."
            },
            bohr: {
                title: "Modèle de Bohr (Niveaux quantifiés)",
                text: "Bohr introduit des orbites précises. Les électrons ne peuvent se trouver que sur des niveaux d'énergie bien définis (couches K, L, M...)."
            },
            quantique: {
                title: "Modèle de Schrödinger (Quantique)",
                text: "L'électron n'a plus de trajectoire fixe. On parle de 'nuage électronique' ou d'orbitales : des zones où la probabilité de présence de l'électron est maximale."
            }
        };

        function selectModel(modelId) {
            currentModel = modelId;
            const area = document.getElementById('view-area');
            const desc = document.getElementById('desc-box');
            const output = document.getElementById('ai-output');
            
            if (animationFrame) cancelAnimationFrame(animationFrame);
            
            document.querySelectorAll('.btn-model').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + modelId).classList.add('active');
            output.style.display = "none";

            area.innerHTML = '';
            desc.innerHTML = `<strong>${models[modelId].title} :</strong> ${models[modelId].text}`;

            if (modelId === 'dalton') {
                area.innerHTML = '<div class="dalton-sphere"></div>';
            } 
            else if (modelId === 'thomson') {
                const pudding = document.createElement('div');
                pudding.className = 'thomson-pudding';
                for(let i=0; i<8; i++) {
                    const e = document.createElement('div');
                    e.className = 'electron';
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 60;
                    e.style.left = (75 + Math.cos(angle)*dist - 3) + 'px';
                    e.style.top = (75 + Math.sin(angle)*dist - 3) + 'px';
                    pudding.appendChild(e);
                }
                area.appendChild(pudding);
            }
            else if (modelId === 'rutherford') {
                area.innerHTML = '<div class="nucleus"></div>';
                for(let i=0; i<3; i++) {
                    createAnimatedElectron(area, 80 + i*35, true);
                }
            }
            else if (modelId === 'bohr') {
                area.innerHTML = '<div class="nucleus"></div>';
                createBohrOrbit(area, 100, 2);
                createBohrOrbit(area, 180, 4);
            }
            else if (modelId === 'quantique') {
                area.innerHTML = '<div class="quantum-cloud"></div><div class="nucleus"></div>';
                createQuantumEffect(area);
            }
        }

        function createAnimatedElectron(parent, radius, randomOrbit) {
            const e = document.createElement('div');
            e.className = 'electron';
            parent.appendChild(e);
            let angle = Math.random() * Math.PI * 2;
            const speed = 0.03 + Math.random() * 0.02;
            const tilt = randomOrbit ? (Math.random() * 360) : 0;

            function animate() {
                angle += speed;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * (randomOrbit ? radius * 0.35 : radius);
                const rotatedX = x * Math.cos(tilt) - y * Math.sin(tilt);
                const rotatedY = x * Math.sin(tilt) + y * Math.cos(tilt);
                e.style.transform = `translate(${rotatedX}px, ${rotatedY}px)`;
                animationFrame = requestAnimationFrame(animate);
            }
            animate();
        }

        function createBohrOrbit(parent, size, count) {
            const orbit = document.createElement('div');
            orbit.className = 'orbit';
            orbit.style.width = size + 'px';
            orbit.style.height = size + 'px';
            parent.appendChild(orbit);
            const radius = size / 2;

            for(let i=0; i<count; i++) {
                const e = document.createElement('div');
                e.className = 'electron';
                orbit.appendChild(e);
                let angle = (i * 2 * Math.PI) / count;
                function animate() {
                    angle += 0.02;
                    e.style.left = (radius + Math.cos(angle) * radius - 3) + 'px';
                    e.style.top = (radius + Math.sin(angle) * radius - 3) + 'px';
                    animationFrame = requestAnimationFrame(animate);
                }
                animate();
            }
        }

        function createQuantumEffect(parent) {
            const electrons = [];
            for(let i=0; i<15; i++) {
                const e = document.createElement('div');
                e.className = 'electron';
                e.style.opacity = '0';
                e.style.width = '4px';
                e.style.height = '4px';
                parent.appendChild(e);
                electrons.push({ el: e, timer: Math.random() * 100 });
            }

            function animate() {
                electrons.forEach(obj => {
                    obj.timer--;
                    if(obj.timer <= 0) {
                        // Position probabiliste (distribution normale simplifiée)
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.abs(normalRandom() * 80); 
                        obj.el.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                        obj.el.style.opacity = Math.random() * 0.8;
                        obj.timer = 5 + Math.random() * 20;
                    }
                });
                animationFrame = requestAnimationFrame(animate);
            }
            function normalRandom() {
                let u = 0, v = 0;
                while(u === 0) u = Math.random();
                while(v === 0) v = Math.random();
                return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
            }
            animate();
        }

        async function askAI(topic) {
            const output = document.getElementById('ai-output');
            output.style.display = "block";
            output.innerHTML = "<em>L'assistant prépare une explication...</em>";

            let prompt = "";
            if (topic === 'experience') {
                prompt = `Explique brièvement l'expérience ou la découverte majeure (ex: équation de Schrödinger, principe d'incertitude) qui a mené au modèle : ${currentModel}.`;
            } else {
                prompt = `Quel est le concept clé ou la limite du modèle : ${currentModel} ? Pour le modèle quantique, explique la notion de probabilité de présence.`;
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "Tu es un professeur de physique-chimie expert. Réponds en 4 phrases max." }] }
                    })
                });
                const data = await response.json();
                output.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                output.innerText = "Erreur de connexion à l'IA.";
            }
        }

        window.onload = () => selectModel('dalton');
    </script>
</body>
</html>
