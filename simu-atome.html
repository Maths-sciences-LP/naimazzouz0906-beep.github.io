<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constructeur d'Atomes & Ions - Labo Virtuel</title>
    
    <!-- Moteur de rendu MathJax -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --primary: #6f42c1;
            --proton: #ef4444;
            --neutron: #94a3b8;
            --electron: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --ai: #8b5cf6;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .card {
            background: var(--card);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-top: 8px solid var(--primary);
        }

        h2 { color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 10px; }

        /* Visualisation Atome */
        .atom-display {
            background: #0f172a; /* Espace profond */
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            position: relative;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .notation-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }

        /* Contrôles */
        .control-group { margin-bottom: 20px; }
        .label-row { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
        
        input[type="range"] { width: 100%; cursor: pointer; }
        #range-p { accent-color: var(--proton); }
        #range-n { accent-color: var(--neutron); }
        #range-e { accent-color: var(--electron); }

        /* Infos */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .info-item {
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .info-item b { color: var(--primary); }

        /* Boutons AI */
        .ai-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            background: var(--ai);
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        #aiResponse {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: #f5f3ff;
            border: 1px solid #ddd6fe;
            display: none;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .stability-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-top: 5px;
        }

        .stable { background: #dcfce7; color: #166534; }
        .unstable { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <h1 style="color: var(--primary); margin-bottom: 30px;">🔬 Laboratoire de Construction Atomique</h1>

    <div class="container">
        
        <!-- Colonne Gauche : Visualisation et Physique -->
        <div class="card">
            <h2>Modèle de Bohr</h2>
            <div class="atom-display">
                <div class="notation-overlay" id="notation">
                    <div style="font-size: 0.6em; position: absolute; top: 0; left: 5px;" id="val-a">1</div>
                    <div style="font-size: 0.6em; position: absolute; bottom: 0; left: 5px;" id="val-z">1</div>
                    <span id="val-symbol">H</span>
                    <div style="font-size: 0.6em; position: absolute; top: 0; right: 5px;" id="val-charge"></div>
                </div>
                
                <!-- SVG de l'atome -->
                <svg viewBox="0 0 400 400" width="100%" height="300" id="atom-svg">
                    <!-- Les orbites et particules seront injectées par JS -->
                </svg>
            </div>

            <div class="info-grid">
                <div class="info-item">Nom : <b id="info-name">Hydrogène</b></div>
                <div class="info-item">État : <b id="info-type">Atome neutre</b></div>
                <div class="info-item">Électrons de valence : <b id="info-valence">1</b></div>
                <div class="info-item">Configuration : <b id="info-config">K(1)</b></div>
            </div>
            
            <div id="stability-info" class="stability-tag stable">Isotope stable</div>
        </div>

        <!-- Colonne Droite : Contrôles et AI -->
        <div class="card" style="border-top-color: #3b82f6;">
            <h2>Composition du Noyau</h2>
            
            <div class="control-group">
                <div class="label-row">
                    <span style="color: var(--proton)">Protons (+)</span>
                    <span id="count-p">1</span>
                </div>
                <input type="range" id="range-p" min="1" max="18" value="1" oninput="update()">
            </div>

            <div class="control-group">
                <div class="label-row">
                    <span style="color: var(--neutron)">Neutrons (0)</span>
                    <span id="count-n">0</span>
                </div>
                <input type="range" id="range-n" min="0" max="22" value="0" oninput="update()">
            </div>

            <div class="control-group">
                <div class="label-row">
                    <span style="color: var(--electron)">Électrons (-)</span>
                    <span id="count-e">1</span>
                </div>
                <input type="range" id="range-e" min="0" max="18" value="1" oninput="update()">
            </div>

            <div class="ai-actions">
                <button onclick="askAI('analyse')">✨ Analyse de l'élément</button>
                <button onclick="askAI('quiz')" style="background: #10b981;">❓ Quiz Rapide</button>
            </div>

            <div id="aiResponse"></div>
        </div>

    </div>

    <script>
        const apiKey = ""; // Géré par l'environnement
        const elementsData = [
            { z: 0, s: "", n: "" },
            { z: 1, s: "H", n: "Hydrogène", mass: 1 },
            { z: 2, s: "He", n: "Hélium", mass: 4 },
            { z: 3, s: "Li", n: "Lithium", mass: 7 },
            { z: 4, s: "Be", n: "Béryllium", mass: 9 },
            { z: 5, s: "B", n: "Bore", mass: 11 },
            { z: 6, s: "C", n: "Carbone", mass: 12 },
            { z: 7, s: "N", n: "Azote", mass: 14 },
            { z: 8, s: "O", n: "Oxygène", mass: 16 },
            { z: 9, s: "F", n: "Fluor", mass: 19 },
            { z: 10, s: "Ne", n: "Néon", mass: 20 },
            { z: 11, s: "Na", n: "Sodium", mass: 23 },
            { z: 12, s: "Mg", n: "Magnésium", mass: 24 },
            { z: 13, s: "Al", n: "Aluminium", mass: 27 },
            { z: 14, s: "Si", n: "Silicium", mass: 28 },
            { z: 15, s: "P", n: "Phosphore", mass: 31 },
            { z: 16, s: "S", n: "Soufre", mass: 32 },
            { z: 17, s: "Cl", n: "Chlore", mass: 35 },
            { z: 18, s: "Ar", n: "Argon", mass: 40 }
        ];

        function update() {
            const p = parseInt(document.getElementById('range-p').value);
            const n = parseInt(document.getElementById('range-n').value);
            const e = parseInt(document.getElementById('range-e').value);

            // Mise à jour labels
            document.getElementById('count-p').innerText = p;
            document.getElementById('count-n').innerText = n;
            document.getElementById('count-e').innerText = e;

            const a = p + n;
            const charge = p - e;
            const el = elementsData[p];

            // Notation chimique
            document.getElementById('val-a').innerText = a;
            document.getElementById('val-z').innerText = p;
            document.getElementById('val-symbol').innerText = el.s;
            
            let chargeTxt = "";
            if(charge > 0) chargeTxt = (charge === 1 ? "+" : charge + "+");
            if(charge < 0) chargeTxt = (charge === -1 ? "-" : Math.abs(charge) + "-");
            document.getElementById('val-charge').innerText = chargeTxt;

            // Infos texte
            document.getElementById('info-name').innerText = el.n;
            let type = "Atome neutre";
            if(charge > 0) type = "Cation (Ion +)";
            if(charge < 0) type = "Anion (Ion -)";
            document.getElementById('info-type').innerText = type;

            // Configuration électronique simplifiée (K, L, M)
            let remaining = e;
            let config = [];
            let shells = [2, 8, 8];
            let shellNames = ['K', 'L', 'M'];
            let valence = 0;
            
            for(let i=0; i<shells.length; i++) {
                if(remaining > 0) {
                    let take = Math.min(remaining, shells[i]);
                    config.push(`${shellNames[i]}(${take})`);
                    valence = take;
                    remaining -= take;
                }
            }
            document.getElementById('info-config').innerText = config.join(' ') || "Aucun électron";
            document.getElementById('info-valence').innerText = valence;

            // Stabilité (règle simplifiée pour école)
            const stabTag = document.getElementById('stability-info');
            const ratio = n / p;
            if (p === 1 && n === 0) {
                stabTag.innerText = "Isotope stable (Protium)";
                stabTag.className = "stability-tag stable";
            } else if (ratio >= 1 && ratio <= 1.5 || (p < 7 && n === p)) {
                stabTag.innerText = "Isotope stable";
                stabTag.className = "stability-tag stable";
            } else {
                stabTag.innerText = "Isotope radioactif (instable)";
                stabTag.className = "stability-tag unstable";
            }

            drawAtom(p, n, e, config);
        }

        function drawAtom(p, n, e, config) {
            const svg = document.getElementById('atom-svg');
            svg.innerHTML = ''; // Clear

            // 1. Dessiner le noyau (amas central)
            const centerX = 200;
            const centerY = 150;
            
            // On dessine quelques cercles pour le noyau
            for(let i=0; i < (p+n); i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 15;
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", centerX + Math.cos(angle) * dist);
                circle.setAttribute("cy", centerY + Math.sin(angle) * dist);
                circle.setAttribute("r", 6);
                circle.setAttribute("fill", i < p ? "var(--proton)" : "var(--neutron)");
                circle.setAttribute("stroke", "#333");
                circle.setAttribute("stroke-width", "0.5");
                svg.appendChild(circle);
            }

            // 2. Dessiner les orbites et électrons
            let shellDistances = [50, 85, 120];
            config.forEach((s, index) => {
                const radius = shellDistances[index];
                const count = parseInt(s.match(/\d+/)[0]);
                
                // Orbite
                const orbit = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                orbit.setAttribute("cx", centerX);
                orbit.setAttribute("cy", centerY);
                orbit.setAttribute("r", radius);
                orbit.setAttribute("fill", "none");
                orbit.setAttribute("stroke", "rgba(255,255,255,0.2)");
                orbit.setAttribute("stroke-dasharray", "4");
                svg.appendChild(orbit);

                // Électrons sur l'orbite
                for(let j=0; j < count; j++) {
                    const angle = (j / count) * Math.PI * 2;
                    const electron = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    const ex = centerX + Math.cos(angle) * radius;
                    const ey = centerY + Math.sin(angle) * radius;
                    electron.setAttribute("cx", ex);
                    electron.setAttribute("cy", ey);
                    electron.setAttribute("r", 4);
                    electron.setAttribute("fill", "var(--electron)");
                    
                    // Animation de rotation
                    const anim = document.createElementNS("http://www.w3.org/2000/svg", "animateTransform");
                    anim.setAttribute("attributeName", "transform");
                    anim.setAttribute("type", "rotate");
                    anim.setAttribute("from", `0 ${centerX} ${centerY}`);
                    anim.setAttribute("to", `360 ${centerX} ${centerY}`);
                    anim.setAttribute("dur", (10 + index * 5) + "s");
                    anim.setAttribute("repeatCount", "indefinite");
                    electron.appendChild(anim);
                    
                    svg.appendChild(electron);
                }
            });
        }

        async function askAI(mode) {
            const p = document.getElementById('range-p').value;
            const n = document.getElementById('range-n').value;
            const e = document.getElementById('range-e').value;
            const el = elementsData[p];
            const respBox = document.getElementById('aiResponse');
            
            respBox.style.display = "block";
            respBox.innerHTML = "<em>L'IA réfléchit...</em>";

            let prompt = "";
            if(mode === 'analyse') {
                prompt = `Analyse l'atome/ion suivant : ${el.n} (Protons:${p}, Neutrons:${n}, Électrons:${e}). 
                Parle de sa stabilité, s'il s'agit d'un isotope connu, et de son utilité concrète dans la vie quotidienne ou l'industrie. Réponds en 4 phrases maximum.`;
            } else {
                prompt = `Génère une question de type QCM rapide (avec la réponse cachée après) pour un élève de lycée sur l'atome/ion composé de ${p} protons, ${n} neutrons et ${e} électrons. La question doit porter sur la charge, la masse ou la configuration électronique.`;
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                respBox.innerHTML = `<strong>✨ Assistant Labo :</strong><br>${text.replace(/\n/g, '<br>')}`;
            } catch (error) {
                respBox.innerText = "Désolé, impossible de contacter l'assistant pour le moment.";
            }
        }

        window.onload = update;
    </script>
</body>
</html>
